<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Grid Responsive + GSAP</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    body {
      background: #FAFAF8;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1A1A18;
      margin: 0;
      padding: 0;
    }
    .pipeline-grid {
      display: grid;
      grid-template-columns: 1fr 60px 1fr 60px 1fr;
      grid-template-rows: auto 60px auto 60px auto;
      gap: 0;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 16px;
      position: relative;
    }
    .step {
      background: #C0522A;
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 22px 18px;
      min-height: 60px;
      box-shadow: 0 2px 10px rgba(192,82,42,.12);
      position: relative;
      opacity: 0;
      transform: translateY(30px);
    }
    .step .title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 7px;
      text-transform: uppercase;
    }
    .step .desc {
      font-size: 0.98rem;
      font-weight: 400;
      color: #fffbe6;
    }
    /* Arrow SVG styling */
    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }
    .arrow svg {
      display: block;
    }
    /* Responsive */
    @media (max-width: 900px) {
      .pipeline-grid {
        grid-template-columns: 1fr 40px 1fr 40px 1fr;
        grid-template-rows: auto 40px auto 40px auto;
      }
    }
    @media (max-width: 600px) {
      .pipeline-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(9, auto);
        gap: 18px;
      }
      .arrow { display: none; }
    }
  </style>
</head>
<body>
  <div class="pipeline-grid">
    <!-- Row 1 -->
    <div class="step" style="grid-column: 1 / 2; grid-row: 1;">Training Dataset</div>
    <div class="arrow" style="grid-column: 2 / 3; grid-row: 1 / 2; justify-content:center;">
      <svg width="60" height="4" viewBox="0 0 60 4"><line x1="0" y1="2" x2="60" y2="2" stroke="#C0522A" stroke-width="4"/></svg>
    </div>
    <div class="step" style="grid-column: 3 / 4; grid-row: 1;">Normalisasi Dataset</div>
    <div class="arrow" style="grid-column: 4 / 5; grid-row: 1 / 2; justify-content:center;">
      <svg width="60" height="4" viewBox="0 0 60 4"><line x1="0" y1="2" x2="60" y2="2" stroke="#C0522A" stroke-width="4"/></svg>
    </div>
    <div class="step" style="grid-column: 5 / 6; grid-row: 1;">Arsitektur Deep Learning (UNET)</div>
    <!-- Arrow down from rightmost step -->
    <div class="arrow" style="grid-column: 5 / 6; grid-row: 2 / 3; align-items:flex-start;">
      <svg width="4" height="60" viewBox="0 0 4 60"><line x1="2" y1="0" x2="2" y2="60" stroke="#C0522A" stroke-width="4"/></svg>
    </div>
    <!-- Row 2 -->
    <div class="step" style="grid-column: 5 / 6; grid-row: 3;">Output Model</div>
    <!-- Arrow L from Output Model to Agregasi True Alert (row 3, col 5 to row 5, col 3) -->
    <div class="arrow" style="grid-column: 5 / 6; grid-row: 4 / 5; align-items:flex-start;">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <polyline points="30,0 30,60 0,60" stroke="#C0522A" stroke-width="4" fill="none"/>
        <polygon points="0,56 0,64 -8,60" fill="#C0522A"/>
      </svg>
    </div>
    <!-- Row 3 -->
    <div class="step" style="grid-column: 3 / 4; grid-row: 5;">Agregasi True Alert</div>
    <!-- Arrow down from Agregasi True Alert -->
    <div class="arrow" style="grid-column: 3 / 4; grid-row: 6 / 7; align-items:flex-start;">
      <svg width="4" height="60" viewBox="0 0 4 60"><line x1="2" y1="0" x2="2" y2="60" stroke="#C0522A" stroke-width="4"/></svg>
    </div>
    <!-- Row 4 -->
    <div class="step" style="grid-column: 3 / 4; grid-row: 7;">Normalisasi Citra Sentinel 2</div>
  </div>
  <script>
    // GSAP animasi box dan panah
    gsap.utils.toArray('.step').forEach((el, i) => {
      gsap.to(el, {
        opacity: 1,
        y: 0,
        duration: 0.7,
        delay: 0.2 + i * 0.2,
        ease: 'power3.out',
        scrollTrigger: {
          trigger: el,
          start: 'top 90%',
          toggleActions: 'play none none reverse'
        }
      });
    });
    gsap.utils.toArray('.arrow svg').forEach((svg, i) => {
      let path = svg.querySelector('line, polyline');
      if (path) {
        const length = path.getTotalLength ? path.getTotalLength() : 100;
        gsap.set(path, { strokeDasharray: length, strokeDashoffset: length });
        gsap.to(path, {
          strokeDashoffset: 0,
          duration: 0.7,
          delay: 0.5 + i * 0.2,
          ease: 'power2.out',
          scrollTrigger: {
            trigger: svg,
            start: 'top 95%',
            toggleActions: 'play none none reverse'
          }
        });
      }
    });
  </script>
</body>
</html>
