<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deforestasi per Pulau 2023–2025</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0e8;
  --card: #ffffff;
  --red: #b74636;
  --red-dark: #9f3d2f;
  --text: #1f1f1f;
  --muted: #6c6257;
  --line: #ddd2c5;
  --row-alt: #f8f4ef;
  --row-highlight: #ead8d6;
  --green: #1f7a4f;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  font-family: 'Poppins', sans-serif;
  color: var(--text);
}

body {
  display: grid;
  place-items: start center;
  padding: 14px 16px 10px;
}

.card {
  width: min(980px, 100%);
  background: var(--card);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
}

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 860px;
}

thead tr.group th {
  background: var(--red);
  color: #fff;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: none;
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,.2);
}

thead tr.group th:first-child {
  text-align: left;
}

thead tr.cols th {
  background: var(--red-dark);
  color: #fff;
  font-size: .72rem;
  font-weight: 600;
  padding: 8px;
  text-align: right;
  border-right: 1px solid rgba(255,255,255,.15);
  user-select: none;
}

thead tr.cols th:first-child {
  text-align: left;
}

thead tr.cols th:last-child {
  border-right: 0;
}

th.sortable {
  cursor: pointer;
  transition: background .15s;
}

th.sortable:hover {
  background: #8e3327;
}

th.sortable.active {
  background: #7f2a20;
}

tbody tr {
  border-bottom: 1px solid var(--line);
  opacity: 0;
  transform: translateX(-8px);
}

tbody tr:nth-child(even) {
  background: var(--row-alt);
}

tbody tr.highlight {
  background: var(--row-highlight) !important;
}

tbody td {
  font-size: .95rem;
  padding: 8px;
  text-align: right;
  color: #3a342e;
}

tbody td:first-child {
  text-align: left;
  font-weight: 700;
  color: #222;
}

tbody tr.total {
  border-top: 2px solid #4b4540;
  border-bottom: 0;
  background: #fff !important;
}

tbody tr.total td {
  color: var(--red);
  font-weight: 800;
}

.badge-rise {
  display: inline-flex;
  min-width: 48px;
  justify-content: center;
  border-radius: 999px;
  padding: 2px 8px;
  background: rgba(31,122,79,.12);
  color: var(--green);
  font-weight: 700;
}

.note {
  padding: 10px 14px 14px;
  font-size: .68rem;
  color: var(--muted);
  border-top: 1px solid var(--line);
}

@media (max-width: 700px) {
  tbody td { font-size: .86rem; }
}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr class="group">
            <th rowspan="2">Pulau</th>
            <th colspan="3">Deforestasi (ha)</th>
            <th colspan="2">Perluasan (2025 vs 2024)</th>
          </tr>
          <tr class="cols">
            <th class="sortable" data-key="v2023">2023</th>
            <th class="sortable" data-key="v2024">2024</th>
            <th class="sortable" data-key="v2025">2025</th>
            <th class="sortable" data-key="hektare">hektare</th>
            <th class="sortable" data-key="persentase">Persentase</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="note">Klik header angka untuk sortir data (baris Total tetap di bawah).</div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const RAW = [
  { pulau:'Kalimantan', v2023:124611, v2024:129896, v2025:158486, hektare:28590, persentase:22 },
  { pulau:'Sumatera', v2023:33311, v2024:91248, v2025:144252, hektare:53004, persentase:58 },
  { pulau:'Papua', v2023:55981, v2024:17341, v2025:77795, hektare:60454, persentase:349, highlight:true },
  { pulau:'Sulawesi', v2023:36814, v2024:17361, v2025:39750, hektare:22389, persentase:129 },
  { pulau:'Maluku', v2023:4034, v2024:3537, v2025:7538, hektare:4001, persentase:113 },
  { pulau:'Bali & Nusa Tenggara', v2023:2052, v2024:1780, v2025:4215, hektare:2435, persentase:137 },
  { pulau:'Jawa', v2023:582, v2024:411, v2025:2221, hektare:1810, persentase:440, highlight:true }
];

const TOTAL = { pulau:'Total', v2023:257385, v2024:261574, v2025:434258, hektare:172684, persentase:66 };

const tbody = document.getElementById('tbody');
const sortHeaders = Array.from(document.querySelectorAll('th.sortable'));

let rows = [...RAW];
let currentSort = { key: null, asc: false };

function fmt(n) {
  return n.toLocaleString('id-ID');
}

function render() {
  tbody.innerHTML = '';

  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (r.highlight) tr.classList.add('highlight');

    tr.innerHTML = `
      <td>${r.pulau}</td>
      <td>${fmt(r.v2023)}</td>
      <td>${fmt(r.v2024)}</td>
      <td>${fmt(r.v2025)}</td>
      <td>${fmt(r.hektare)}</td>
      <td><span class="${r.persentase >= 300 ? 'badge-rise' : ''}">${fmt(r.persentase)}</span></td>
    `;
    tbody.appendChild(tr);
  });

  const trTotal = document.createElement('tr');
  trTotal.className = 'total';
  trTotal.innerHTML = `
    <td>${TOTAL.pulau}</td>
    <td>${fmt(TOTAL.v2023)}</td>
    <td>${fmt(TOTAL.v2024)}</td>
    <td>${fmt(TOTAL.v2025)}</td>
    <td>${fmt(TOTAL.hektare)}</td>
    <td>${fmt(TOTAL.persentase)}</td>
  `;
  tbody.appendChild(trTotal);

  animateRows();
}

function animateRows() {
  gsap.fromTo('#tbody tr',
    { opacity: 0, x: -8 },
    { opacity: 1, x: 0, duration: .35, stagger: .04, ease: 'power2.out' }
  );
}

function sortBy(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort.key = key;
    currentSort.asc = false;
  }

  const dir = currentSort.asc ? 1 : -1;
  rows.sort((a, b) => (a[key] - b[key]) * dir);

  sortHeaders.forEach(h => h.classList.remove('active'));
  const active = sortHeaders.find(h => h.dataset.key === key);
  if (active) active.classList.add('active');

  render();
}

sortHeaders.forEach(h => {
  h.addEventListener('click', () => sortBy(h.dataset.key));
});

gsap.to('#card', { opacity: 1, y: 0, duration: .55, ease: 'power3.out', delay: .1 });
render();
</script>
</body>
</html>
