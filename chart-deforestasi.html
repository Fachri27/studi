<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deforestasi Indonesia, 2001–2025</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { poppins: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style type="text/tailwindcss">
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DYNAMIC ELEMENT CLASSES (via @apply) ── */
  .y-tick {
    @apply text-[0.6rem] text-[#7a9e97] text-right pr-3 font-normal whitespace-nowrap;
  }
  .grid-line {
    @apply w-full h-px bg-[rgba(255,255,255,0.07)] absolute left-0;
  }
  .bar-col {
    @apply flex flex-col items-center justify-end h-full cursor-pointer relative;
  }
  .bar-rect {
    @apply w-full relative bg-[#bc4a3c];
    border-radius: 3px 3px 0 0;
    transform-origin: bottom center;
    transform: scaleY(0);
    transition: background .15s;
  }
  .bar-col:hover .bar-rect { background: #d4574a; }
  .bar-col.active .bar-rect { background: #e07060; }
  .x-label {
    @apply text-[0.52rem] text-[#7a9e97] text-center font-normal pt-1;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  .x-label.highlight { @apply text-[#e07060] font-semibold; }
  .pres-card {
    @apply flex items-center gap-3 py-[9px] px-[10px] rounded-lg cursor-pointer mb-[5px] border border-transparent;
    opacity: .55;
    transition: background .18s, opacity .18s, border-color .18s;
  }
  .pres-card:hover { background: rgba(255,255,255,.04); opacity: .8; }
  .pres-card.active {
    background: rgba(224,112,96,.07);
    border-color: rgba(224,112,96,.22);
    opacity: 1;
  }
  .pres-avatar {
    @apply relative w-[46px] h-[46px] rounded-full overflow-hidden shrink-0 border-2 border-[rgba(224,112,96,0.2)] bg-[rgba(255,255,255,0.06)];
    transition: border-color .25s;
  }
  .pres-avatar img {
    @apply absolute inset-0 w-full h-full object-cover object-top z-[2];
  }
  .pres-card.active .pres-avatar { border-color: #e07060; }
  .pres-initials {
    @apply absolute inset-0 flex items-center justify-center text-[0.72rem] font-bold text-[#e07060] z-[1];
  }
  .pres-info { @apply flex-1 min-w-0; }
  .pres-name {
    @apply text-[0.82rem] font-bold text-[#e8f0ee] leading-tight mb-0.5;
    transition: color .2s;
  }
  .pres-card.active .pres-name { color: #e07060; }
  .pres-period { @apply text-[0.54rem] text-[#7a9e97]; }
  .pres-stat { @apply text-right shrink-0; }
  .pres-total {
    @apply text-[0.7rem] font-bold text-[#e8f0ee] whitespace-nowrap;
    transition: color .2s;
  }
  .pres-card.active .pres-total { color: #e07060; }
  .pres-total-unit { @apply text-[0.5rem] text-[#7a9e97]; }
</style>
</head>
<body class="h-full bg-[#1a1f1e] font-poppins text-[#e8f0ee] overflow-hidden">

<div id="app" class="flex h-screen overflow-hidden max-w-[980px] mx-auto w-full">

  <!-- CHART -->
  <div id="chart-area" class="flex-1 flex flex-col pt-[40px] px-[44px] pb-[32px] min-w-0">
    <div class="mb-8">
      <div class="text-xl font-bold text-[#e8f0ee] tracking-tight mb-1">Deforestasi Indonesia, 2001–2025</div>
      <div class="text-[0.7rem] text-[#7a9e97]">Luas hutan yang hilang per tahun · hektare</div>
    </div>

    <div id="chart-body" class="flex-1 flex min-h-0 relative">
      <!-- Y label -->
      <div class="text-[0.6rem] text-[#7a9e97] [writing-mode:vertical-rl] rotate-180 whitespace-nowrap self-center pr-2 tracking-[.05em] shrink-0">Deforestasi (ha)</div>

      <!-- Y axis ticks -->
      <div id="y-axis" class="flex flex-col-reverse justify-between pb-[78px] w-[72px] shrink-0"></div>

      <!-- Bars + grid -->
      <div id="bars-wrap" class="flex-1 flex flex-col min-w-0 relative">
        <div id="grid-lines" class="flex-1 relative">
          <!-- injected -->
        </div>
        <div id="bars-svg-wrap" class="absolute top-0 left-0 right-0 bottom-[78px] grid items-end gap-x-[3px] px-0.5">
          <!-- injected -->
        </div>
        <div id="x-axis" class="grid gap-x-[3px] px-0.5 h-[78px] items-start"></div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div id="detail-panel" class="w-[280px] bg-[#1a2826] border-l border-[rgba(255,255,255,0.07)] flex flex-col shrink-0">
    <div class="py-[28px] px-[22px] flex flex-col h-full overflow-hidden">
      <div class="mb-[18px]">
        <div class="text-[0.6rem] font-bold tracking-[.16em] uppercase text-[#e07060] mb-[3px]">Era Kepemimpinan</div>
        <div class="text-[0.55rem] text-[rgba(255,255,255,0.2)]">klik untuk sorot era</div>
      </div>

      <div id="pres-list"></div>

      <div class="mt-auto pt-[18px] border-t border-[rgba(255,255,255,0.07)] pb-4">
        <div class="text-[0.55rem] font-semibold tracking-[.14em] uppercase text-[#7a9e97] mb-1" id="yd-year">Arahkan ke bar</div>
        <div class="text-[2.2rem] font-bold text-[#e8f0ee] leading-none mb-0.5" id="yd-val">—</div>
        <div class="text-[0.56rem] text-[#7a9e97]">ha deforestasi</div>
      </div>

      <div class="text-[0.55rem] text-[rgba(255,255,255,0.12)] leading-relaxed pt-[14px]">
        Data: University of Maryland Lossyear · Auriga STADI<br>
        simontini.id
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ─── DATA ─── */
const DATA = [
  { year: 2001, val: 133913 },
  { year: 2002, val: 281030 },
  { year: 2003, val: 253907 },
  { year: 2004, val: 486010 },
  { year: 2005, val: 483324 },
  { year: 2006, val: 474863 },
  { year: 2007, val: 533334 },
  { year: 2008, val: 472889 },
  { year: 2009, val: 691985 },
  { year: 2010, val: 546069 },
  { year: 2011, val: 621836 },
  { year: 2012, val: 876456 },
  { year: 2013, val: 523588 },
  { year: 2014, val: 829144 },
  { year: 2015, val: 768991 },
  { year: 2016, val: 1055796 },
  { year: 2017, val: 424048 },
  { year: 2018, val: 389052 },
  { year: 2019, val: 371087 },
  { year: 2020, val: 307532 },
  { year: 2021, val: 229982 },
  { year: 2022, val: 230760 },
  { year: 2023, val: 257384 },
  { year: 2024, val: 261575 },
  { year: 2025, val: 433751 },
];

const MAX_VAL = Math.max(...DATA.map(d => d.val));
const Y_TICKS = [0, 400000, 800000, 1200000, 1600000, 2000000];

/* ─── FORMAT ─── */
function fmt(v) {
  return v.toLocaleString('id-ID');
}

/* ─── BUILD Y AXIS ─── */
const yAxis = document.getElementById('y-axis');
Y_TICKS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'y-tick';
  el.textContent = t === 0 ? '0' : (t >= 1000000 ? (t/1000000).toFixed(1).replace('.',',') + 'jt' : (t/1000) + 'rb');
  yAxis.appendChild(el);
});

/* ─── BUILD GRID LINES ─── */
const gridWrap = document.getElementById('grid-lines');
Y_TICKS.forEach(t => {
  const line = document.createElement('div');
  line.className = 'grid-line';
  line.style.bottom = ((t / MAX_VAL) * 100) + '%';
  gridWrap.appendChild(line);
});

/* ─── BUILD BARS + X AXIS ─── */
const barsWrap = document.getElementById('bars-svg-wrap');
const xAxis   = document.getElementById('x-axis');
const barEls  = [];

const colsTemplate = `repeat(${DATA.length}, minmax(0, 1fr))`;
barsWrap.style.gridTemplateColumns = colsTemplate;
xAxis.style.gridTemplateColumns = colsTemplate;

DATA.forEach((d, i) => {
  const col = document.createElement('div');
  col.className = 'bar-col';
  col.dataset.index = i;

  const rect = document.createElement('div');
  rect.className = 'bar-rect';
  const pct = (d.val / MAX_VAL) * 100;
  rect.style.height = pct + '%';

  col.appendChild(rect);
  barsWrap.appendChild(col);
  barEls.push({ col, rect });

  // x label
  const lbl = document.createElement('div');
  lbl.className = 'x-label' + (d.year % 4 === 1 ? ' highlight' : '');
  lbl.textContent = d.year;
  xAxis.appendChild(lbl);

});  // end forEach bars

/* ─── GSAP INTRO ANIMATION ─── */
gsap.to(barEls.map(b => b.rect), {
  scaleY: 1,
  duration: .9,
  ease: 'power3.out',
  stagger: .045,
  delay: .2,
});

/* ─── PRESIDENTS ─── */
const PRESIDENTS = [
  { name:'Megawati', start:2001, end:2004, photo:'assets/images/presiden/meg.jpeg' },
  { name:'Susilo Bambang Yudhoyono', start:2005, end:2014, photo:'assets/images/presiden/sby.jpg' },
  { name:'Jokowi',   start:2015, end:2024, photo:'assets/images/presiden/jok.jpeg'   },
  { name:'Prabowo',  start:2025, end:2025, photo:'assets/images/presiden/pra.jpeg'  },
];

function getPresident(year) {
  return PRESIDENTS.find(p => year >= p.start && year <= p.end) || null;
}

function calcTotal(p) {
  return DATA.filter(d => d.year >= p.start && d.year <= p.end).reduce((s, d) => s + d.val, 0);
}

function fmtTotal(v) {
  return (v / 1000000).toFixed(2).replace('.', ',') + ' jt';
}

/* ─── BUILD PRESIDENT CARDS ─── */
const presList = document.getElementById('pres-list');
const cardEls  = [];

PRESIDENTS.forEach(p => {
  const total = calcTotal(p);
  const card  = document.createElement('div');
  card.className = 'pres-card';
  card.innerHTML = `
    <div class="pres-avatar">
      <img src="${p.photo}" alt="${p.name}" onerror="this.style.display='none'">
      <span class="pres-initials">${p.name.slice(0,3).toUpperCase()}</span>
    </div>
    <div class="pres-info">
      <div class="pres-name">${p.name}</div>
      <div class="pres-period">${p.start === p.end ? p.start : p.start + '\u2013' + p.end}</div>
    </div>
    <div class="pres-stat">
      <div class="pres-total">${fmtTotal(total)}</div>
      <div class="pres-total-unit">ha hilang</div>
    </div>`;
  presList.appendChild(card);
  cardEls.push(card);
});

/* ─── ERA STATE ─── */
let activeEra = null;

function setEra(name) {
  activeEra = name;
  barEls.forEach(({ col, rect }, i) => {
    const p     = getPresident(DATA[i].year);
    const match = p && p.name === name;
    gsap.to(col, { opacity: match ? 1 : 0.12, duration: .3, ease: 'power2.out' });
    rect.style.background = match ? '#e07060' : '';
  });
  cardEls.forEach((c, i) => c.classList.toggle('active', PRESIDENTS[i].name === name));
}

function clearEra() {
  activeEra = null;
  barEls.forEach(({ col, rect }) => {
    gsap.to(col, { opacity: 1, duration: .3, ease: 'power2.out' });
    rect.style.background = '';
  });
  cardEls.forEach(c => c.classList.remove('active'));
}

cardEls.forEach((card, i) => {
  card.addEventListener('click', () => {
    if (activeEra === PRESIDENTS[i].name) clearEra();
    else setEra(PRESIDENTS[i].name);
  });
});

/* ─── YEAR DISPLAY ─── */
const ydYear = document.getElementById('yd-year');
const ydVal  = document.getElementById('yd-val');

function updateYearDisplay(d) {
  ydYear.textContent = d ? d.year : 'Arahkan ke bar';
  ydVal.textContent  = d ? d.val.toLocaleString('id-ID') : '\u2014';
}

/* ─── HOVER SCALE PULSE ─── */
barEls.forEach(({ col, rect }, i) => {
  col.addEventListener('mouseenter', () => {
    gsap.to(rect, { scaleY: 1.025, transformOrigin: 'bottom center', duration: .18, ease: 'power1.out' });
    updateYearDisplay(DATA[i]);
    if (!activeEra) {
      const hovPres = getPresident(DATA[i].year);
      cardEls.forEach((c, ci) => {
        c.style.opacity = hovPres && PRESIDENTS[ci].name === hovPres.name ? '1' : '0.3';
      });
    }
  });
  col.addEventListener('mouseleave', () => {
    gsap.to(rect, { scaleY: 1, duration: .22, ease: 'power1.out' });
    updateYearDisplay(null);
    if (!activeEra) cardEls.forEach(c => { c.style.opacity = ''; });
  });
  col.addEventListener('click', () => {
    const pres = getPresident(DATA[i].year);
    if (!pres) return;
    if (activeEra === pres.name) clearEra(); else setEra(pres.name);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearEra();
});
</script>
</body>
</html>
