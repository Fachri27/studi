<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deforestasi Indonesia, 2001–2025</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1a1f1e;
  --surface:   #222928;
  --bar:       #bc4a3c;
  --bar-hover: #d4574a;
  --bar-active:#e07060;
  --text:      #e8f0ee;
  --muted:     #7a9e97;
  --border:    rgba(255,255,255,.07);
  --panel-bg:  #1a2826;
  --accent:    #e07060;
  --x-axis-h: 78px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Poppins', sans-serif;
  color: var(--text);
  overflow: hidden;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
  max-width: 980px;
  margin: 0 auto;
  width: 100%;
}

/* ── CHART AREA ── */
#chart-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px 44px 32px;
  min-width: 0;
  transition: padding-right .4s cubic-bezier(.4,0,.2,1);
}

/* ── TITLE ── */
.chart-header {
  margin-bottom: 32px;
}
.chart-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  margin-bottom: 4px;
}
.chart-sub {
  font-size: .7rem;
  color: var(--muted);
  font-weight: 400;
}

/* ── CHART BODY ── */
#chart-body {
  flex: 1;
  display: flex;
  gap: 0;
  min-height: 0;
  position: relative;
}

/* ── Y AXIS ── */
#y-axis {
  display: flex;
  flex-direction: column-reverse;
  justify-content: space-between;
  padding-bottom: var(--x-axis-h);
  width: 72px;
  flex-shrink: 0;
}
.y-tick {
  font-size: .6rem;
  color: var(--muted);
  text-align: right;
  padding-right: 12px;
  font-weight: 400;
  white-space: nowrap;
}

/* ── BARS CONTAINER ── */
#bars-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* ── GRID LINES ── */
#grid-lines {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column-reverse;
  justify-content: space-between;
}
.grid-line {
  width: 100%;
  height: 1px;
  background: var(--border);
  position: absolute;
  left: 0;
}

/* ── BARS SVG ── */
#bars-svg-wrap {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: var(--x-axis-h);
  display: grid;
  align-items: flex-end;
  column-gap: 3px;
  padding: 0 2px;
}

.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
  cursor: pointer;
  position: relative;
  gap: 0;
}

.bar-rect {
  width: 100%;
  border-radius: 3px 3px 0 0;
  background: var(--bar);
  transform-origin: bottom center;
  transform: scaleY(0);
  transition: background .15s;
  position: relative;
}

.bar-col:hover .bar-rect {
  background: var(--bar-hover);
}

.bar-col.active .bar-rect {
  background: var(--bar-active);
}

/* ── X AXIS ── */
#x-axis {
  display: grid;
  column-gap: 3px;
  padding: 0 2px;
  margin-top: 0;
  height: var(--x-axis-h);
  align-items: start;
}
.x-label {
  flex: 1;
  font-size: .52rem;
  color: var(--muted);
  text-align: center;
  font-weight: 400;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  padding-top: 4px;
}
.x-label.highlight { color: var(--accent); font-weight: 600; }

/* ── Y LABEL ── */
.y-axis-label {
  font-size: .6rem;
  color: var(--muted);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  white-space: nowrap;
  align-self: center;
  padding-right: 8px;
  letter-spacing: .05em;
  flex-shrink: 0;
}

/* ── DETAIL PANEL ── */
#detail-panel {
  width: 280px;
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.panel-inner {
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
}

/* ── PANEL HEADER ── */
.panel-header { margin-bottom: 18px; }
.ph-title {
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3px;
}
.ph-sub {
  font-size: .55rem;
  color: rgba(255,255,255,.2);
}

/* ── PRESIDENT CARDS ── */
.pres-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 5px;
  border: 1px solid transparent;
  opacity: .55;
  transition: background .18s, opacity .18s, border-color .18s;
}
.pres-card:hover { background: rgba(255,255,255,.04); opacity: .8; }
.pres-card.active {
  background: rgba(224,112,96,.07);
  border-color: rgba(224,112,96,.22);
  opacity: 1;
}

.pres-avatar {
  position: relative;
  width: 46px; height: 46px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid rgba(224,112,96,.2);
  background: rgba(255,255,255,.06);
  transition: border-color .25s;
}
.pres-card.active .pres-avatar { border-color: var(--accent); }
.pres-avatar img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top; z-index: 2;
}
.pres-initials {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700;
  color: var(--accent); z-index: 1;
}
.pres-info { flex: 1; min-width: 0; }
.pres-name {
  font-size: .82rem; font-weight: 700;
  color: var(--text); line-height: 1.2;
  margin-bottom: 2px; transition: color .2s;
}
.pres-card.active .pres-name { color: var(--accent); }
.pres-period { font-size: .54rem; color: var(--muted); }
.pres-stat { text-align: right; flex-shrink: 0; }
.pres-total {
  font-size: .7rem; font-weight: 700;
  color: var(--text); white-space: nowrap;
  transition: color .2s;
}
.pres-card.active .pres-total { color: var(--accent); }
.pres-total-unit { font-size: .5rem; color: var(--muted); }

/* ── YEAR DISPLAY ── */
.year-display {
  margin-top: auto;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  padding-bottom: 16px;
}
.yd-label {
  font-size: .55rem; font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.yd-val {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1; margin-bottom: 2px;
}
.yd-unit { font-size: .56rem; color: var(--muted); }

.panel-note {
  font-size: .55rem;
  color: rgba(255,255,255,.12);
  line-height: 1.6;
  padding-top: 14px;
}

/* ── SOURCE ── */
#source-bar {
  padding: 10px 44px;
  font-size: .55rem;
  color: rgba(255,255,255,.2);
  line-height: 1.6;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<div id="app">

  <!-- CHART -->
  <div id="chart-area">
    <div class="chart-header">
      <div class="chart-title">Deforestasi Indonesia, 2001–2025</div>
      <div class="chart-sub">Luas hutan yang hilang per tahun · hektare</div>
    </div>

    <div id="chart-body">
      <!-- Y label -->
      <div class="y-axis-label">Deforestasi (ha)</div>

      <!-- Y axis ticks -->
      <div id="y-axis"></div>

      <!-- Bars + grid -->
      <div id="bars-wrap">
        <div id="grid-lines" style="flex:1; position:relative;">
          <!-- injected -->
        </div>
        <div id="bars-svg-wrap">
          <!-- injected -->
        </div>
        <div id="x-axis"></div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div id="detail-panel">
    <div class="panel-inner">
      <div class="panel-header">
        <div class="ph-title">Era Kepemimpinan</div>
        <div class="ph-sub">klik untuk sorot era</div>
      </div>

      <div id="pres-list"></div>

      <div class="year-display">
        <div class="yd-label" id="yd-year">Arahkan ke bar</div>
        <div class="yd-val" id="yd-val">—</div>
        <div class="yd-unit">ha deforestasi</div>
      </div>

      <div class="panel-note">
        Data: University of Maryland Lossyear · Auriga STADI<br>
        simontini.id
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ─── DATA ─── */
const DATA = [
  { year: 2001, val: 133913 },
  { year: 2002, val: 281030 },
  { year: 2003, val: 253907 },
  { year: 2004, val: 486010 },
  { year: 2005, val: 483324 },
  { year: 2006, val: 474863 },
  { year: 2007, val: 533334 },
  { year: 2008, val: 472889 },
  { year: 2009, val: 691985 },
  { year: 2010, val: 546069 },
  { year: 2011, val: 621836 },
  { year: 2012, val: 876456 },
  { year: 2013, val: 523588 },
  { year: 2014, val: 829144 },
  { year: 2015, val: 768991 },
  { year: 2016, val: 1055796 },
  { year: 2017, val: 424048 },
  { year: 2018, val: 389052 },
  { year: 2019, val: 371087 },
  { year: 2020, val: 307532 },
  { year: 2021, val: 229982 },
  { year: 2022, val: 230760 },
  { year: 2023, val: 257384 },
  { year: 2024, val: 261575 },
  { year: 2025, val: 433751 },
];

const MAX_VAL = Math.max(...DATA.map(d => d.val));
const Y_TICKS = [0, 400000, 800000, 1200000, 1600000, 2000000];

/* ─── FORMAT ─── */
function fmt(v) {
  return v.toLocaleString('id-ID');
}

/* ─── BUILD Y AXIS ─── */
const yAxis = document.getElementById('y-axis');
Y_TICKS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'y-tick';
  el.textContent = t === 0 ? '0' : (t >= 1000000 ? (t/1000000).toFixed(1).replace('.',',') + 'jt' : (t/1000) + 'rb');
  yAxis.appendChild(el);
});

/* ─── BUILD GRID LINES ─── */
const gridWrap = document.getElementById('grid-lines');
Y_TICKS.forEach(t => {
  const line = document.createElement('div');
  line.className = 'grid-line';
  line.style.bottom = ((t / MAX_VAL) * 100) + '%';
  gridWrap.appendChild(line);
});

/* ─── BUILD BARS + X AXIS ─── */
const barsWrap = document.getElementById('bars-svg-wrap');
const xAxis   = document.getElementById('x-axis');
const barEls  = [];

const colsTemplate = `repeat(${DATA.length}, minmax(0, 1fr))`;
barsWrap.style.gridTemplateColumns = colsTemplate;
xAxis.style.gridTemplateColumns = colsTemplate;

DATA.forEach((d, i) => {
  const col = document.createElement('div');
  col.className = 'bar-col';
  col.dataset.index = i;

  const rect = document.createElement('div');
  rect.className = 'bar-rect';
  const pct = (d.val / MAX_VAL) * 100;
  rect.style.height = pct + '%';

  col.appendChild(rect);
  barsWrap.appendChild(col);
  barEls.push({ col, rect });

  // x label
  const lbl = document.createElement('div');
  lbl.className = 'x-label' + (d.year % 4 === 1 ? ' highlight' : '');
  lbl.textContent = d.year;
  xAxis.appendChild(lbl);

});  // end forEach bars

/* ─── GSAP INTRO ANIMATION ─── */
gsap.to(barEls.map(b => b.rect), {
  scaleY: 1,
  duration: .9,
  ease: 'power3.out',
  stagger: .045,
  delay: .2,
});

/* ─── PRESIDENTS ─── */
const PRESIDENTS = [
  { name:'Megawati', start:2001, end:2004, photo:'assets/images/presiden/megawati.jpg' },
  { name:'Susilo Bambang Yudhoyono', start:2005, end:2014, photo:'assets/images/presiden/sby.jpg' },
  { name:'Jokowi',   start:2015, end:2024, photo:'assets/images/presiden/jokowi.jpg'   },
  { name:'Prabowo',  start:2025, end:2025, photo:'assets/images/presiden/prabowo.jpg'  },
];

function getPresident(year) {
  return PRESIDENTS.find(p => year >= p.start && year <= p.end) || null;
}

function calcTotal(p) {
  return DATA.filter(d => d.year >= p.start && d.year <= p.end).reduce((s, d) => s + d.val, 0);
}

function fmtTotal(v) {
  return (v / 1000000).toFixed(2).replace('.', ',') + ' jt';
}

/* ─── BUILD PRESIDENT CARDS ─── */
const presList = document.getElementById('pres-list');
const cardEls  = [];

PRESIDENTS.forEach(p => {
  const total = calcTotal(p);
  const card  = document.createElement('div');
  card.className = 'pres-card';
  card.innerHTML = `
    <div class="pres-avatar">
      <img src="${p.photo}" alt="${p.name}" onerror="this.style.display='none'">
      <span class="pres-initials">${p.name.slice(0,3).toUpperCase()}</span>
    </div>
    <div class="pres-info">
      <div class="pres-name">${p.name}</div>
      <div class="pres-period">${p.start === p.end ? p.start : p.start + '\u2013' + p.end}</div>
    </div>
    <div class="pres-stat">
      <div class="pres-total">${fmtTotal(total)}</div>
      <div class="pres-total-unit">ha hilang</div>
    </div>`;
  presList.appendChild(card);
  cardEls.push(card);
});

/* ─── ERA STATE ─── */
let activeEra = null;

function setEra(name) {
  activeEra = name;
  barEls.forEach(({ col, rect }, i) => {
    const p     = getPresident(DATA[i].year);
    const match = p && p.name === name;
    gsap.to(col, { opacity: match ? 1 : 0.12, duration: .3, ease: 'power2.out' });
    rect.style.background = match ? 'var(--bar-active)' : '';
  });
  cardEls.forEach((c, i) => c.classList.toggle('active', PRESIDENTS[i].name === name));
}

function clearEra() {
  activeEra = null;
  barEls.forEach(({ col, rect }) => {
    gsap.to(col, { opacity: 1, duration: .3, ease: 'power2.out' });
    rect.style.background = '';
  });
  cardEls.forEach(c => c.classList.remove('active'));
}

cardEls.forEach((card, i) => {
  card.addEventListener('click', () => {
    if (activeEra === PRESIDENTS[i].name) clearEra();
    else setEra(PRESIDENTS[i].name);
  });
});

/* ─── YEAR DISPLAY ─── */
const ydYear = document.getElementById('yd-year');
const ydVal  = document.getElementById('yd-val');

function updateYearDisplay(d) {
  ydYear.textContent = d ? d.year : 'Arahkan ke bar';
  ydVal.textContent  = d ? d.val.toLocaleString('id-ID') : '\u2014';
}

/* ─── HOVER SCALE PULSE ─── */
barEls.forEach(({ col, rect }, i) => {
  col.addEventListener('mouseenter', () => {
    gsap.to(rect, { scaleY: 1.025, transformOrigin: 'bottom center', duration: .18, ease: 'power1.out' });
    updateYearDisplay(DATA[i]);
    if (!activeEra) {
      const hovPres = getPresident(DATA[i].year);
      cardEls.forEach((c, ci) => {
        c.style.opacity = hovPres && PRESIDENTS[ci].name === hovPres.name ? '1' : '0.3';
      });
    }
  });
  col.addEventListener('mouseleave', () => {
    gsap.to(rect, { scaleY: 1, duration: .22, ease: 'power1.out' });
    updateYearDisplay(null);
    if (!activeEra) cardEls.forEach(c => { c.style.opacity = ''; });
  });
  col.addEventListener('click', () => {
    const pres = getPresident(DATA[i].year);
    if (!pres) return;
    if (activeEra === pres.name) clearEra(); else setEra(pres.name);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearEra();
});
</script>
</body>
</html>
