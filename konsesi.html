<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deforestasi dalam Konsesi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --red: #8b2a1a;
  --red-light: #c04030;
  --cream: #f5f0e8;
  --dark: #1a1a1a;
  --tan: #d4c4a0;
  --muted: #5a5040;
}

body { font-family:'Poppins',sans-serif; background:var(--cream); color:var(--dark); display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
#sidebar {
  width:280px; flex-shrink:0;
  background:var(--dark); color:var(--cream);
  display:flex; flex-direction:column;
  padding:28px 20px 24px;
  overflow-y:auto;
  z-index:10;
  transition:width 0.3s ease;
}

@media (max-width: 768px) {
  #sidebar { width:200px; padding:20px 14px 18px; }
  #sidebar h1 { font-size:1rem; }
  .cat-btn { font-size:.75rem; padding:9px 12px; }
  .stat-block { padding:10px 12px; }
  .stat-block .s-val { font-size:1.2rem; }
}

@media (max-width: 480px) {
  body { flex-direction:column; }
  #sidebar { width:100%; flex-shrink:0; height:auto; max-height:35vh; padding:16px 14px 14px; }
  #sidebar h1 { font-size:.9rem; }
  #map-wrap { flex:1; }
}

#sidebar h1 {
  font-family:'Poppins',sans-serif;
  font-size:1.25rem; font-weight:700; line-height:1.2;
  color:var(--cream); margin-bottom:6px;
}
#sidebar .s-sub {
  font-family:'Poppins',sans-serif;
  font-size:.6rem; color:var(--tan); letter-spacing:.08em;
  text-transform:uppercase; margin-bottom:20px;
}

.cat-btn {
  width:100%; text-align:left; padding:11px 14px;
  margin-bottom:8px; border-radius:6px;
  border:1.5px solid rgba(255,255,255,.1);
  background:transparent; color:rgba(245,240,232,.6);
  font-family:'Poppins',sans-serif; font-size:.82rem; font-weight:600;
  cursor:pointer; transition:.2s;
  display:flex; align-items:center; gap:10px;
}
.cat-btn:hover { border-color:var(--red-light); color:var(--cream); }
.cat-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

.s-divider { height:1px; background:rgba(255,255,255,.08); margin:16px 0; }

.stat-block {
  background:rgba(139,42,26,.15); border-left:3px solid var(--red);
  border-radius:4px; padding:12px 14px; margin-bottom:10px;
}
.stat-block .s-label { font-family:'Poppins',sans-serif; font-size:.55rem; color:var(--tan); letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
.stat-block .s-val { font-family:'Poppins',sans-serif; font-size:1.5rem; font-weight:700; color:var(--cream); line-height:1; }
.stat-block .s-unit { font-size:.6rem; font-family:'Poppins',sans-serif; color:var(--tan); }

.bullet-list { list-style:none; padding:0; margin-top:6px; }
.bullet-list li {
  font-size:.72rem; line-height:1.55; color:rgba(245,240,232,.65);
  padding-left:12px; position:relative; margin-bottom:5px;
  font-family:'Poppins',sans-serif;
}
.bullet-list li::before { content:'—'; position:absolute; left:0; color:var(--red-light); }

/* MAP */
#map-wrap { flex:1; position:relative; overflow:hidden; }
#map { width:100%; height:100%; }

#map-title {
  position:absolute; top:76px; left:20px; z-index:500;
  pointer-events:none;
}
#map-title h2 {
  font-family:'Poppins',sans-serif;
  font-size:clamp(1rem,1.8vw,1.45rem); font-weight:700;
  color:var(--dark); line-height:1.25;
}

@media (max-width: 768px) {
  #map-title { top:66px; left:14px; }
  #map-title h2 { font-size:clamp(.85rem,1.5vw,1.1rem); }
}

#others-badge {
  position:absolute; bottom:28px; right:24px; z-index:500;
  background:var(--red); border-radius:50%;
  width:120px; height:120px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#fff; text-align:center; pointer-events:none;
  box-shadow:0 4px 24px rgba(139,42,26,.4);
}

@media (max-width: 768px) {
  #others-badge { width:100px; height:100px; bottom:20px; right:16px; }
  #others-badge .ob-val { font-size:1.1rem; }
  #others-badge .ob-label { font-size:.5rem; }
}
#others-badge .ob-label { font-family:'Poppins',sans-serif; font-size:.55rem; letter-spacing:.05em; line-height:1.4; opacity:.85; }
#others-badge .ob-val   { font-family:'Poppins',sans-serif; font-size:1.4rem; font-weight:700; line-height:1; }
#others-badge .ob-unit  { font-family:'Poppins',sans-serif; font-size:.55rem; opacity:.85; }

/* LEAFLET */
.leaflet-container { background:#e8e4da !important; }

.dot-marker {
  width:28px; height:28px;
  border-radius:50%;
  background:var(--red); color:#fff;
  font-family:'Poppins',sans-serif; font-size:.75rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(255,255,255,.95);
  box-shadow:0 2px 8px rgba(139,42,26,.35);
  cursor:pointer;
  transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
}
.dot-marker:hover { filter:brightness(1.15); transform:scale(1.15); }

.cluster-icon {
  background:var(--red); color:#fff; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Poppins',sans-serif; font-weight:700; font-size:13px;
  border:3px solid rgba(255,255,255,.9);
  box-shadow:0 3px 12px rgba(139,42,26,.55);
}
/* hide default markercluster styles */
.marker-cluster { background:transparent !important; }
.marker-cluster div { background:transparent !important; }

.leaflet-tooltip.label-tip {
  background:transparent; border:none; box-shadow:none;
  padding:0; white-space:nowrap; pointer-events:none;
}
.label-box { font-family:'Poppins',sans-serif; font-size:.72rem; line-height:1.3; }
.label-box .lb-name { color:var(--dark); font-weight:600; }
.label-box .lb-val  { color:var(--red); font-family:'Poppins',sans-serif; font-size:.85rem; font-weight:700; }
.leaflet-tooltip::before { display:none !important; }

.leaflet-popup-content-wrapper {
  border-radius:8px; padding:0; overflow:hidden;
  border-top:3px solid var(--red);
  font-family:'Poppins',sans-serif;
  box-shadow:0 8px 28px rgba(26,26,26,.18);
}
.popup-inner { padding:12px 16px; }
.popup-rank  { font-family:'Poppins',sans-serif; font-size:.6rem; color:var(--muted); }
.popup-name  { font-size:.9rem; font-weight:700; margin:3px 0 6px; color:var(--dark); }
.popup-val   { font-family:'Poppins',sans-serif; font-size:1.4rem; font-weight:700; color:var(--red); line-height:1; }
.popup-unit  { font-family:'Poppins',sans-serif; font-size:.6rem; color:var(--muted); margin-top:2px; }
.popup-type  { display:inline-block; margin-top:8px; font-family:'Poppins',sans-serif; font-size:.6rem; background:rgba(139,42,26,.1); color:var(--red); border-radius:4px; padding:2px 7px; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Deforestasi<br>dalam Konsesi</h1>
  <p class="s-sub">// Sepuluh teratas per kategori · 2025</p>

  <button class="cat-btn active" onclick="loadData('kebun-kayu')" id="btn-kebun-kayu">Konsesi Kebun Kayu</button>
  <button class="cat-btn" onclick="loadData('logging')" id="btn-logging">Konsesi Logging</button>
  <button class="cat-btn" onclick="loadData('sawit')" id="btn-sawit">Konsesi Sawit</button>
  <button class="cat-btn" onclick="loadData('tambang')" id="btn-tambang">Konsesi Tambang</button>

  <div class="s-divider"></div>

  <div class="stat-block">
    <div class="s-label">Total deforestasi (10 teratas)</div>
    <div class="s-val" id="stat-total">21.799</div>
    <div class="s-unit">hektare</div>
  </div>

  <ul class="bullet-list" id="stat-bullets">
    <li>Deforestasi dalam 212 konsesi kebun kayu</li>
    <li>34% deforestasi terjadi pada 10 perusahaan teratas</li>
  </ul>
</div>

<div id="map-wrap">
  <!-- <div id="map-title">
    <h2 id="map-heading">Sepuluh teratas deforestasi<br>di konsesi kebun kayu</h2>
  </div> -->
  <div id="map"></div>
  <div id="others-badge">
    <div class="ob-label" id="ob-label">202 izin<br>Lainnya</div>
    <div class="ob-val" id="ob-val">21.799</div>
    <div class="ob-unit">hektare</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const map = L.map('map', {
  zoomControl:true,
  attributionControl:false,
  gestureHandling:true
}).setView([-2, 118], 5);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', { subdomains:'abcd', maxZoom:19 }).addTo(map);

let markersLayer = null;
function clearLayers() {
  if (markersLayer) map.removeLayer(markersLayer);
  markersLayer = null;
}

const DATASETS = {
  'kebun-kayu': {
    othersLabel: '202 izin<br>Lainnya', othersVal: '21.799', statTotal: '21.799',

    geojsonFile: 'kebun-kayu.geojson',

      { lat:-1.335276267511383, lng:114.138747007539251, rank:5,  name:'PT BUMI HIJAU PRIMA',                   value:1294, dir:'left'   },
      { lat:-2.009800604760271, lng:111.153569955554644, rank:6,  name:'PT GRACE PUTRI PERDANA',                value:1170, dir:'left'   },
      { lat:1.853305859481002,  lng:117.594275093006445, rank:7,  name:'PT HUTAN BERAU LESTARI',                value:1096, dir:'right'  },
      { lat:0.026386043655114,  lng:115.929349893182021, rank:8,  name:'PT SENDAWAR ADHI KARYA',                value:1018, dir:'right'  },
      { lat:1.340801486700338,  lng:118.240850579581576, rank:9,  name:'PT SWADAYA PERKASA',                    value:661,  dir:'right'  },
      { lat:1.374270568895824,  lng:101.806156676794458, rank:10, name:'PT SEKATO PRATAMA MAKMUR',              value:652,  dir:'bottom' },
    ]
  },
  'logging': {
    othersLabel: '227 izin<br>Lainnya', othersVal: '53.661', statTotal: '53.661',
    bullets: ['Deforestasi dalam 237 konsesi logging','28% deforestasi dalam konsesi logging terjadi pada 10 perusahaan teratas'],
    geojsonFile: 'logging.geojson',
    points: [
      { lat:0.881264893236657,  lng:117.026904047300249, rank:1,  name:'PT KIANI LESTARI',                        value:3739, dir:'right'  },
      { lat:-1.252358059458737, lng:114.487610383463576, rank:2,  name:'PT DASA INTIGA',                          value:3195, dir:'left'  },
      { lat:2.098063545278295,  lng:101.015865352762475, rank:3,  name:'PT DIAMOND RAYA TIMBER',                  value:2741, dir:'right' },
      { lat:-3.017296513002015, lng:101.832872347710747, rank:4,  name:'PT ANUGERAH PRATAMA INSPIRASI',           value:2210, dir:'bottom'},
      { lat:-0.75146963045224,  lng:116.510730877588813, rank:5,  name:'PT ITCI KARTIKA UTAMA (ITCIKU)',          value:1902, dir:'right' },
      { lat:2.028798962469609,  lng:117.080426147312622, rank:6,  name:'PT INHUTANI I UNIT LABANAN',              value:1687, dir:'right' },
      { lat:-3.502650172817841, lng:135.621210438578998, rank:7,  name:'PT JATI DHARMA INDAH PLYWOOD INDUSTRIES', value:1415, dir:'bottom'},
      { lat:2.474287034103671,  lng:117.210276665613563, rank:8,  name:'PT INHUTANI I UNIT SAMBARATA',         value:1330, dir:'left'  },
      { lat:-1.051472046229932, lng:113.055533404223866, rank:9,  name:'PT DWIMA JAYA UTAMA',                     value:1266, dir:'top'   },
      { lat:1.288242736097689,  lng:99.580298186802281,  rank:10, name:'PT BARUMUN RAYA PADANG LANGKAT',          value:1259, dir:'left'  },
    ]
  },
  'sawit': {
    othersLabel: '709 izin<br>Lainnya', othersVal: '24.300', statTotal: '24.300',
    bullets: ['Deforestasi seluas 37.910 ha dalam 719 konsesi sawit sepanjang 2025','36% (13.610 ha) terjadi pada 10 konsesi teratas','Pusat ekspansi berada di Kalimantan dan Tanah Papua'],
    geojsonFile: 'sawit.geojson',
    points: [
      { lat:-1.171071756797254, lng:131.391544937632204, rank:1,  name:'Inti Kebun Lestari',      value:2624, dir:'top'    },
      { lat:0.675035799730648,  lng:121.473335486617259, rank:2,  name:'Banyan Tumbuh Lestari',   value:2093, dir:'right'  },
      { lat:-1.283649245406992, lng:131.24771276041497, rank:3,  name:'Inti Kebun Sejahtera',    value:2052, dir:'right'  },
      { lat:-7.873776279100799, lng:140.650276678006122, rank:4,  name:'Merauke Sawit Jaya',      value:1807, dir:'left'   },
      { lat:-1.444431042873964, lng:131.2297651958757, rank:5,  name:'Papua Lestari Abadi',     value:1299, dir:'right'  },
      { lat:0.876612002390529,  lng:112.828968572362726, rank:6,  name:'Borneo International Anugerah', value:876, dir:'right' },
      { lat:-1.6730810929783,   lng:113.408354095172541, rank:7,  name:'Agro Kalimantan Lestari', value:784,  dir:'left'   },
      { lat:1.223818358664025,  lng:118.285216683843913, rank:8,  name:'Anugrah Surya Mandiri',   value:712,  dir:'top'    },
      { lat:0.996544524718871,  lng:112.051890133518881, rank:9,  name:'Khatulistiwa Agro Abadi', value:681,  dir:'left'   },
      { lat:-0.228874466961059, lng:104.847611995376113, rank:10, name:'Citra Sugi Aditya',       value:675,  dir:'bottom' },
    ]
  },
  'tambang': {
    othersLabel: '1.131 izin<br>Lainnya', othersVal: '32.233', statTotal: '32.233',
    bullets: ['Deforestasi seluas 41.162 ha dalam 1.140 konsesi tambang sepanjang 2025','22% (8.929 ha) terjadi dalam 10 perusahaan teratas','Ekspansi tambang emas meningkat selain nikel di Indonesia'],
    geojsonFile: 'tambang.geojson',
    points: [
      { lat:2.138922060693282, lng:117.395321188956885, rank:1,  name:'Berau Coal (Batubara)',             value:1473, dir:'right'  },
      { lat:-3.003818526025582, lng:121.809448329238492, rank:2,  name:'Sulawesi Cahaya Mineral (Nikel)',   value:1085, dir:'right'  },
      { lat:-0.090328260786384, lng:114.919059555847099, rank:3,  name:'Maruwai Coal (Batubara)',           value:919,  dir:'top'    },
      { lat:0.627934768307973, lng:128.004841288293079, rank:4,  name:'Weda Bay Nickel (Nikel)',           value:902,  dir:'right'  },
      { lat:-2.634066859436454, lng:121.488538466272828, rank:5,  name:'Vale Indonesia TBK (Nikel)',        value:842,  dir:'left'   },
      { lat:1.370910557959839, lng:99.149585821220384,  rank:6,  name:'Agincourt Resources (Emas)',        value:839,  dir:'left'   },
      { lat:-0.207788395378338, lng:115.026603507062106, rank:7,  name:'Lahai Coal (Batubara)',             value:770,  dir:'left'   },
      { lat:-1.541190947688207, lng:112.517178689769239, rank:8,  name:'Blok Waringin Agung (Emas)',       value:763,  dir:'right'  },
      { lat:-1.039139704484105, lng:114.625074268594773, rank:9,  name:'Suprabari Mapanindo Mineral',      value:673,  dir:'left'   },
      { lat:-2.843717003693491, lng:121.980032209226394, rank:10, name:'Bintang Delapan Mineral (Nikel)',  value:658,  dir:'bottom' },
    ]
  }
};

function loadData(type) {
  clearLayers();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+type).classList.add('active');

  const d = DATASETS[type];
  document.getElementById('stat-total').textContent = d.statTotal;
  document.getElementById('ob-label').innerHTML     = d.othersLabel;
  document.getElementById('ob-val').textContent     = d.othersVal;
  document.getElementById('stat-bullets').innerHTML = d.bullets.map(b=>`<li>${b}</li>`).join('');

  markersLayer = L.featureGroup();

  function processPoints(points) {
    points.forEach(p => {
      const icon = L.divIcon({
        className: '',
        html: `<div class="dot-marker">${p.rank}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });

      const marker = L.marker([p.lat, p.lng], { icon });

      marker.bindPopup(`
        <div class="popup-inner">
          <div class="popup-rank">Peringkat #${p.rank}</div>
          <div class="popup-name">${p.name}</div>
          <div class="popup-val">${p.value.toLocaleString('id-ID')}</div>
          <div class="popup-unit">hektare</div>
          <div class="popup-type">${type}</div>
        </div>
      `);

      markersLayer.addLayer(marker);
    });

    map.addLayer(markersLayer);
  }

  // Load GeoJSON if available, otherwise use hardcoded points
  if (d.geojsonFile) {
    console.log('Loading GeoJSON:', d.geojsonFile);
    fetch(d.geojsonFile)
      .then(res => {
        console.log('Fetch response:', res.status);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(geojson => {
        console.log('GeoJSON loaded, features:', geojson.features.length);
        const points = geojson.features.map(f => ({
          lat: f.geometry.coordinates[1],
          lng: f.geometry.coordinates[0],
          rank: f.properties.rank,
          name: f.properties.namobj,
          value: f.properties.value,
          dir: f.properties.dir || 'right'
        }));
        console.log('Processed points:', points);
        processPoints(points);
      })
      .catch(err => {
        console.error('Error loading GeoJSON:', err);
        console.log('Fallback to hardcoded points');
        if (d.points && d.points.length > 0) {
          processPoints(d.points);
        }
      });
  } else if (d.points && d.points.length > 0) {
    console.log('Using hardcoded points');
    processPoints(d.points);
  }
}

loadData('kebun-kayu');
</script>
</body>
</html>
