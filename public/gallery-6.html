<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery Editorial</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: #f5f0e8;
}


.container {
  max-width: 980px;
}

.main-img {
  width: 100%;
  aspect-ratio: 16 / 9; 
  overflow: hidden;
}

.main-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}


.gallery-row {
  display: flex;
  gap: 16px;
  margin-top: 16px;
  align-items: flex-start;
}


.thumbs {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 8px;
  flex: 1;
}

.thumbs img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  cursor: pointer;
  transition: 0.2s;
}

.thumbs img:hover {
  opacity: 0.8;
}


.caption {
  width: 500px;
  text-align: right;
}

.cap-title {
  font-size: 13px;
}

.cap-sub {
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

  
  <div class="main-img">
    <img id="mainImage"
         src="assets/foto/DJI_20250511122956_0285_D (1).jpg"
         data-title="Kawasan Hutan Produksi Terbatas, Konsesi PBPH, PT Hutan Berau Lestari,"
         data-sub="Berau, Kalimantan Timur, Mei 2025">
  </div>


  <div class="gallery-row">

  
    <div class="thumbs">
       <img class="thumb"
           src="assets/foto/DJI_20250511122956_0285_D (1).jpg"
           data-title="Kawasan Hutan Produksi Terbatas, Konsesi PBPH, PT Hutan Berau Lestari,"
           data-sub="Berau, Kalimantan Timur, Mei 2025">

      <img class="thumb"
           src="assets/foto/DJI_20250624103545_0002_V.jpg"
           data-title="Kawasan Hutan Produksi, Konsesi Tambang, PT Sulawesi Cahaya Mineral,"
           data-sub="Konawe, Sulawesi Tenggara, Juni 2025">

      <img class="thumb"
           src="assets/foto/DJI_20251004102535_0115_D.png"
           data-title="Kawasan Hutan Produksi Terbatas,PLTA Mentarang,"
           data-sub="Malinau, Kalimantan Utara, Oktober 2025">

        
     <img class="thumb"
        src="assets/foto/DJI_20250618133349_0160_D.jpg"
        data-title="Area Penggunaan Lain, Konsesi Kebun Sawit, PT Borneo Internasional Anugerah,"
        data-sub=" Kapuas Hulu, Kalimantan Barat, Juni 2025">
       
    </div>

    
    <div class="caption">
      <span class="cap-title" id="capTitle">
        Kawasan Hutan Produksi Terbatas, Konsesi PBPH, PT Hutan Berau Lestari,
      </span><br>
      <span class="cap-sub" id="capSub">
        Berau, Kalimantan Timur, Mei 2025
      </span>
    </div>

  </div>

</div>

<script>
const mainImage = document.getElementById("mainImage");
const capTitle = document.getElementById("capTitle");
const capSub = document.getElementById("capSub");
const thumbs = document.querySelectorAll(".thumb");

thumbs.forEach(img => {
  img.addEventListener("click", () => {

    // ganti gambar utama saja
    mainImage.src = img.src;

    // ganti caption
    mainImage.setAttribute("data-title", img.getAttribute("data-title"));
    mainImage.setAttribute("data-sub", img.getAttribute("data-sub"));

    capTitle.textContent = img.getAttribute("data-title");
    capSub.textContent = img.getAttribute("data-sub");

  });
});
</script>

</body>
</html>
