<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gallery Editorial</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f0e8;
    }


    .container {
      max-width: 980px;
      margin: 0;
    }

    .main-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    .main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }


    .gallery-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      align-items: flex-start;
    }


    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 8px;
      flex: 1;
    }

    .thumbs img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      cursor: pointer;
      transition: 0.2s;
    }

    .thumbs img:hover {
      opacity: 0.8;
    }


    .caption {
      width: 300px;
      text-align: right;
    }

    .cap-title {
      font-size: 13px;
    }

    .cap-sub {
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="container">


    <div class="main-img">
      <img id="mainImage" src="assets/foto/DJI_20250624103545_0002_V.jpg"
        data-title="Konsesi Tambang, PT Sulawesi Cahaya Mineral," data-sub="Konawe, Sulawesi Tenggara, Juni 2025">
    </div>


    <div class="gallery-row">


      <div class="thumbs">
        <img class="thumb" src="assets/foto/DJI_20250624103545_0002_V.jpg"
          data-title="Konsesi Tambang, PT Sulawesi Cahaya Mineral," data-sub="Konawe, Sulawesi Tenggara, Juni 2025">

        <img class="thumb" src="assets/foto/DJI_20251218121849_0006_V.jpg"
          data-title="Konsesi Tambang, PT Nusa Karya Arindo," data-sub="Halmahera Timur, Maluku Utara, Desember 2025">

        <img class="thumb" src="assets/foto/DJI_20251222094403_0062_V.jpg" 
        data-title="Konsesi Tambang, PT Indonesia Pomalaa Industry Park,"
          data-sub="Kolaka, Sulawesi Tenggara, Desember 2025">

        <img class="thumb" src="assets/foto/Vale_Kolonodale_Sulteng2.jpg"
          data-title="Konsesi Tambang, PT Vale Indonesia," data-sub="Bahodopi, Sulawesi Tengah, Oktober 2025">

      </div>


      <div class="caption">
        <span class="cap-title" id="capTitle">
          Konsesi Tambang, PT Sulawesi Cahaya Mineral,
        </span><br>
        <span class="cap-sub" id="capSub">
          Konawe, Sulawesi Tenggara, Juni 2025
        </span>
      </div>

    </div>

  </div>

  <script>
    const mainImage = document.getElementById("mainImage");
    const capTitle = document.getElementById("capTitle");
    const capSub = document.getElementById("capSub");
    const thumbs = document.querySelectorAll(".thumb");

    thumbs.forEach(img => {
      img.addEventListener("click", () => {

        // ganti gambar utama saja
        mainImage.src = img.src;

        // ganti caption
        mainImage.setAttribute("data-title", img.getAttribute("data-title"));
        mainImage.setAttribute("data-sub", img.getAttribute("data-sub"));

        capTitle.textContent = img.getAttribute("data-title");
        capSub.textContent = img.getAttribute("data-sub");

      });
    });
  </script>

</body>

</html>
