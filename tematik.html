<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Peta Tematik Deforestasi 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button, input, select, textarea { font-family: 'Poppins', sans-serif; }
:root {
  --red: #8b2a1a;
  --red-light: #c04030;
  --cream: #f5f0e8;
  --dark: #1a1a1a;
  --muted: #5a5040;
  --tan: #d4c4a0;
  --border: #e1d5c6;
  --panel: #f8f4ee;
}
body {
  font-family: 'Poppins', sans-serif;
  background: var(--cream);
  color: var(--dark);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* SIDEBAR */
#sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--dark);
  color: var(--cream);
  padding: 28px 20px;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,.08);
}
#sidebar h1 {
  font-family: 'Poppins', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 8px;
}
#sidebar .sub {
  font-family: 'Poppins', sans-serif;
  font-size: .62rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--tan);
  margin-bottom: 18px;
}
.mode-btn {
  width: 100%;
  border: 1.5px solid rgba(255,255,255,.12);
  background: transparent;
  color: rgba(245,240,232,.65);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 9px;
  text-align: left;
  cursor: pointer;
  font-size: .84rem;
  font-weight: 600;
  transition: .2s;
}
.mode-btn:hover { border-color: var(--red-light); color: #fff; }
.mode-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

#sidebar .divider {
  height: 1px;
  background: rgba(255,255,255,.08);
  margin: 16px 0;
}

.kpi {
  background: rgba(139,42,26,.14);
  border-left: 3px solid var(--red);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 10px;
}
.kpi .label {
  font-family: 'Poppins', sans-serif;
  font-size: .56rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--tan);
}
.kpi .val {
  font-family: 'Poppins', sans-serif;
  font-size: 1.7rem;
  font-weight: 700;
  line-height: 1;
  margin-top: 4px;
}
.kpi .unit {
  font-family: 'Poppins', sans-serif;
  font-size: .56rem;
  color: var(--tan);
  margin-top: 3px;
}

.kpi #sidebar-notes {
  list-style: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,.12);
}
.kpi #sidebar-notes li {
  font-size: .73rem;
  line-height: 1.6;
  margin-bottom: 6px;
  color: rgba(245,240,232,.78);
  padding-left: 14px;
  position: relative;
}
.kpi #sidebar-notes li:last-child {
  margin-bottom: 0;
}
.kpi #sidebar-notes li::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--red-light);
}

/* MAP + OVERLAY */
#wrap {
  position: relative;
  flex: 1;
  min-width: 0;
  background: #ece8df;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#map {
  width: 100%;
  flex: 1;
  min-height: 0;
}

#title-block {
  position: absolute;
  top: 74px;
  left: 18px;
  z-index: 600;
  pointer-events: none;
}
#title-block h2 {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: clamp(1.2rem, 2vw, 2.15rem);
  line-height: 1.2;
  color: var(--dark);
  text-shadow: 0 2px 10px rgba(255,255,255,.7);
}

#interaction-hint {
  position: absolute;
  top: 22px;
  right: 18px;
  z-index: 625;
  background: rgba(26,26,26,.78);
  color: rgba(245,240,232,.9);
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 999px;
  padding: 6px 10px;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  letter-spacing: .07em;
  text-transform: uppercase;
  backdrop-filter: blur(6px);
}

#others-bubble {
  position: absolute;
  right: 22px;
  top: 96px;
  z-index: 620;
  width: 168px;
  height: 168px;
  border-radius: 50%;
  background: rgba(192,64,48,.95);
  color: #fff;
  display: none;
  text-align: center;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 16px;
  box-shadow: 0 8px 26px rgba(139,42,26,.35);
}
#others-bubble .small {
  font-size: .68rem;
  line-height: 1.3;
}
#others-bubble .big {
  font-family: 'Poppins', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
  margin-top: 6px;
}
#others-bubble .mono {
  font-family: 'Poppins', sans-serif;
  font-size: .56rem;
  margin-top: 2px;
  opacity: .9;
}

#notes-wrap {
  position: absolute;
  left: 18px;
  bottom: 150px;
  z-index: 620;
  width: min(430px, 42vw);
  display: flex;
  flex-direction: column;
  gap: 0;
}



#notes-box {
  border: 1px solid #918376;
  background: rgba(248,244,238,.94);
  padding: 14px 14px 10px;
  box-shadow: 0 8px 24px rgba(26,26,26,.12);
}

#notes-box ul {
  margin: 0;
  padding-left: 18px;
}
#notes-box li {
  font-size: .82rem;
  line-height: 1.48;
  margin-bottom: 6px;
}

/* Right sliding table panel — overlays the map */
#table-panel {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: min(600px, 56vw);
  background: var(--dark);
  z-index: 650;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  border-left: 2px solid rgba(255,255,255,.1);
  box-shadow: -10px 0 40px rgba(0,0,0,.45);
}
#table-panel.open {
  transform: translateX(0);
}

/* Toggle tab sits on the left edge of the panel */
#table-toggle {
  position: absolute;
  left: -36px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  display: none;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  background: var(--dark);
  color: var(--cream);
  border: none;
  border-radius: 8px 0 0 8px;
  padding: 20px 9px;
  font-family: 'Poppins', sans-serif;
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: -4px 0 14px rgba(0,0,0,.3);
  transition: background .2s;
  line-height: 1;
  white-space: nowrap;
}
#table-toggle:hover,
#table-panel.open #table-toggle { background: var(--red); }

#table-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 0;
}
.table-card {
  background: var(--dark);
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 8px 28px rgba(0,0,0,.45);
  border-radius: 4px;
  color: var(--cream);
  flex-shrink: 0;
}
.table-title {
  font-family: 'Poppins', sans-serif;
  font-size: .62rem;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--red);
  padding: 10px 14px;
  position: sticky;
  top: 0;
  z-index: 2;
}
.table-card table {
  width: 100%;
  border-collapse: collapse;
  font-size: .8rem;
  table-layout: auto;
}
.table-card thead tr { border-bottom: 2px solid var(--red-light); }
.table-card th, .table-card td {
  border-bottom: 1px solid rgba(255,255,255,.07);
  padding: 9px 12px;
  vertical-align: middle;
  white-space: nowrap;
}
.table-card th:nth-child(3), .table-card td:nth-child(3) {
  white-space: normal;
  overflow-wrap: break-word;
}
/* 5 kolom: rank25, rank24, provinsi, 2025ha, 2024ha */
.table-card th:nth-child(1), .table-card td:nth-child(1) { width: 6%; }
.table-card th:nth-child(2), .table-card td:nth-child(2) { width: 8%; }
.table-card th {
  font-family: 'Poppins', sans-serif;
  font-size: .56rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  text-align: right;
  color: var(--tan);
  background: transparent;
  font-weight: 600;
}
.table-card th:nth-child(3) { text-align: left; }
.table-card td { text-align: right; color: var(--cream); }
.table-card td:nth-child(3) { text-align: left; font-weight: 600; color: var(--cream); }
.table-card tr:nth-child(even) td { background: rgba(255,255,255,.03); }
.table-card tbody tr {
  cursor: pointer;
  transition: background .15s ease;
}
.table-card tbody tr:hover td {
  background: rgba(192,64,48,.18) !important;
}
.table-card tbody tr.active-row td {
  background: rgba(192,64,48,.26) !important;
}
.table-card tbody tr.total-row td {
  font-weight: 700;
  color: var(--red-light);
  border-top: 2px solid var(--red-light);
  background: transparent !important;
}
.td-up   { color: var(--red-light) !important; }
.td-down { color: var(--muted) !important; }
.td-same { color: var(--tan) !important; }

/* Leaflet custom */
.leaflet-container { background: #efebe3 !important; }
.rank-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--red);
  border: 2px solid rgba(255,255,255,.95);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Poppins', sans-serif;
  font-size: .75rem;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(139,42,26,.35);
  transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
}
.rank-dot.active {
  transform: scale(1.2);
  box-shadow: 0 0 0 8px rgba(192,64,48,.18), 0 7px 18px rgba(139,42,26,.4);
  filter: saturate(1.12);
}
.species-dot {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid rgba(192,64,48,.95);
  color: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.45rem;
  box-shadow: 0 3px 10px rgba(26,26,26,.22);
  transition: transform .16s ease, box-shadow .16s ease;
  overflow: hidden;
}
.species-dot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.species-dot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  font-size: 0;
}
.species-dot.is-image {
  padding: 0;
  font-size: 0;
}
.leaflet-tooltip.label-tip {
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
}
.leaflet-tooltip::before { display: none !important; }
.leaflet-popup-content-wrapper {
  border-radius: 8px !important;
  padding: 0 !important;
  overflow: hidden;
  border-top: 3px solid var(--red);
  font-family: 'Poppins', sans-serif;
  box-shadow: 0 8px 28px rgba(26,26,26,.18);
  min-width: 180px;
}
.leaflet-popup-content {
  margin: 0 !important;
  min-width: 180px;
}
.leaflet-popup-tip-container { display: block; }
.popup-inner { padding: 12px 16px; }
.popup-rank  { font-size: .6rem; color: var(--muted); margin-bottom: 3px; }
.popup-name  { font-size: .9rem; font-weight: 700; margin: 3px 0 6px; color: var(--dark); line-height: 1.3; }
.popup-val   { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--red); line-height: 1; }
.popup-unit  { font-size: .6rem; color: var(--muted); margin-top: 2px; }
.popup-type  { display: inline-block; margin-top: 8px; font-size: .6rem; background: rgba(139,42,26,.1); color: var(--red); border-radius: 4px; padding: 2px 7px; }

/* Satwa Badges — horizontal strip at top of map */
#satwa-badges {
  display: none;
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 450;
  pointer-events: none;
  padding: 10px 18px;
  flex-direction: row;
  align-items: flex-end;
  justify-content: center;
  gap: 10px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  background: rgba(248,244,238,.7);
  backdrop-filter: blur(6px);
  border-radius: 60px;
  max-width: 92vw;
}
#satwa-badges::-webkit-scrollbar { display: none; }
#satwa-badges.visible {
  display: flex;
}

.satwa-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  pointer-events: auto;
  cursor: pointer;
  background: transparent;
  flex-shrink: 0;
  transition: transform .18s ease;
}
.satwa-badge:hover {
  transform: translateY(-3px);
}

.satwa-badge-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--red);
  box-shadow: 0 4px 14px rgba(0,0,0,0.28);
  background: #fff;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
}

.satwa-badge:hover .satwa-badge-circle,
.satwa-badge.active .satwa-badge-circle {
  border-color: var(--red);
  box-shadow: 0 0 0 4px rgba(192,64,48,.22), 0 6px 18px rgba(0,0,0,0.35);
}

.satwa-badge-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.satwa-badge-name {
  display: none;
}

.satwa-badge.active .satwa-badge-name {
  background: var(--red);
  color: #fff;
}
.satwa-badge.active .satwa-badge-name { display: none; }
.satwa-badge-detail {
  display: none;
  flex-direction: column-reverse;
  align-items: center;
  gap: 1px;
  pointer-events: none;
  animation: satwa-info-in .18s ease;
}
.satwa-badge.active .satwa-badge-detail { display: flex; }
@keyframes satwa-info-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.satwa-badge-detail .si-name {
  font-family: 'Poppins', sans-serif;
  font-size: .58rem;
  font-style: italic;
  color: var(--dark);
  font-weight: 600;
  text-align: center;
  max-width: 90px;
  white-space: normal;
  line-height: 1.2;
  background: rgba(248,244,238,.9);
  border-radius: 4px;
  padding: 2px 5px;
}
.satwa-badge-detail .si-val {
  font-family: 'Poppins', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  color: var(--red-light);
  background: rgba(248,244,238,.9);
  border-radius: 4px;
  padding: 1px 6px;
}
.satwa-badge-detail .si-unit {
  font-size: .5rem;
  color: var(--muted);
  background: rgba(248,244,238,.75);
  border-radius: 4px;
  padding: 1px 5px;
}
#satwa-badges.has-active .satwa-badge:not(.active) {
  opacity: 0.35;
  filter: grayscale(0.5);
  transition: opacity .2s ease, filter .2s ease;
}
#satwa-badges.has-active .satwa-badge:not(.active):hover {
  opacity: 0.7;
  filter: grayscale(0);
}
.satwa-badge.loading .satwa-badge-circle {
  opacity: 0.6;
  animation: satwa-pulse 0.9s ease-in-out infinite alternate;
}
@keyframes satwa-pulse {
  from { box-shadow: 0 0 0 2px rgba(192,64,48,.3); }
  to   { box-shadow: 0 0 0 6px rgba(192,64,48,.55); }
}

/* Responsive */
@media (max-width: 1280px) {
  #table-panel { width: min(560px, 52vw); }
  #table-wrap { gap: 0; }
  #notes-wrap { width: min(390px, 40vw); }
}

@media (max-width: 980px) {
  body { flex-direction: column; overflow: hidden; }
  #sidebar {
    width: 100%;
    max-height: 32vh;
    border-right: 0;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding: 16px 14px;
  }
  #sidebar h1 { font-size: 1.08rem; }
  #sidebar .sub { margin-bottom: 12px; }
  .mode-btn { font-size: .78rem; padding: 9px 10px; margin-bottom: 7px; }

  #title-block { top: 64px; left: 10px; }
  #title-block h2 { font-size: clamp(.95rem, 2.2vw, 1.2rem); }

  #interaction-hint {
    top: 8px;
    right: 8px;
    font-size: .48rem;
    padding: 4px 7px;
  }

  #notes-wrap {
    left: 12px;
    right: 12px;
    width: auto;
    bottom: 18px;
  }
  #notes-box {
    max-height: 24vh;
    overflow-y: auto;
  }
  #table-panel { width: min(96vw, 480px); }
  #table-wrap { padding: 0; gap: 0; }
  .table-card {
    overflow: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .table-card table {
    min-width: 0;
    font-size: .64rem;
  }
  .table-card th, .table-card td {
    padding: 4px 5px;
  }

  #others-bubble {
    width: 132px;
    height: 132px;
    right: 10px;
    top: 56px;
  }
  #others-bubble .big { font-size: 1.55rem; }
}
@media (max-width: 640px) {
  #title-block { top: 60px; }

  #sidebar {
    max-height: 30vh;
    padding: 12px 10px;
  }
  #sidebar h1 { font-size: .95rem; }
  .mode-btn { font-size: .72rem; padding: 8px 9px; }

  #interaction-hint { display: none; }

  #others-bubble {
    width: 108px;
    height: 108px;
    top: 52px;
    right: 8px;
    padding: 10px;
  }
  #others-bubble .small { font-size: .55rem; }
  #others-bubble .big { font-size: 1.2rem; }
  #others-bubble .mono { font-size: .48rem; }

  #notes-box {
    font-size: .72rem;
    padding: 10px 10px 8px;
    max-height: 22vh;
  }
  #notes-box li {
    font-size: .72rem;
    line-height: 1.4;
  }

  #table-wrap { gap: 8px; }
  .table-title { font-size: .52rem; padding: 6px 8px; }
  .table-card table { min-width: 0; font-size: .6rem; }
  .table-card th, .table-card td { padding: 4px; }
}
</style>
</head>
<body>
  <aside id="sidebar">
    <h1>Peta Tematik<br>Deforestasi</h1>
    <p class="sub">Pilih jenis analisis · 2025</p>

    <button class="mode-btn active" data-mode="provinsi">Deforestasi berbasis provinsi</button>
    <button class="mode-btn" data-mode="kabupaten">Deforestasi berbasis kabupaten</button>
    <button class="mode-btn" data-mode="konservasi">Deforestasi di kawasan konservasi</button>
    <button class="mode-btn" data-mode="megafauna">Deforestasi di Habitat megafauna ikonik</button>

    <div class="divider"></div>

    <div class="kpi">
      <div class="label" id="kpi-label">Total</div>
      <div class="val" id="kpi-val">433.751</div>
      <div class="unit" id="kpi-unit">hektare</div>

      <ul id="sidebar-notes"></ul>
    </div>
  </aside>

  <main id="wrap">
    <div id="map"></div>
    <div id="satwa-badges"></div>

    <div id="interaction-hint">klik titik / klik baris tabel / tombol 1–4</div>

    <div id="title-block">
      <h2 id="map-title">Deforestasi berbasis provinsi</h2>
    </div>

    <div id="others-bubble">
      <div class="small" id="bubble-label">Kabupaten lainnya</div>
      <div class="big" id="bubble-val">338.018</div>
      <div class="mono" id="bubble-unit">hektare</div>
    </div>

    <div id="notes-wrap">
      <!-- <div id="map-legend">
        <div class="leg-swatch"></div>
        <span>Deforestasi di Indonesia</span>
      </div> -->
      <div id="notes-box"><ul id="notes-list"></ul></div>
    </div>

    <div id="table-panel">
      <button id="table-toggle">Tabel ▶</button>
      <div id="table-wrap"></div>
    </div>
  </main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>
<script>
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false,
  gestureHandling: true,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  minZoom: 4,
  maxZoom: 9
}).setView([-2.3, 118], 5);

function clearModeVisuals() {
  markerLayer.clearLayers();
  polygonLayer.clearLayers();
  map.closePopup();
  markerRegistry = [];
  activeMarker = null;
  activeRow = null;
  activeEntry = null;
  activePolygonSpecies = null;
  document.getElementById('table-wrap').innerHTML = '';
  document.getElementById('table-panel').classList.remove('open');
  document.getElementById('table-toggle').style.display = 'none';
  const sp = document.getElementById('satwa-badges');
  sp.innerHTML = '';
  sp.classList.remove('visible', 'has-active');
}

function setActiveMarker(marker) {
  if (activeMarker && activeMarker._icon) {
    activeMarker._icon.querySelector('.rank-dot, .species-dot')?.classList.remove('active');
  }
  activeMarker = marker;
  if (activeMarker && activeMarker._icon) {
    activeMarker._icon.querySelector('.rank-dot, .species-dot')?.classList.add('active');
  }
}

function clearActiveRow() {
  if (activeRow) activeRow.classList.remove('active-row');
  activeRow = null;
}

function registerMarker(entry) {
  markerRegistry.push(entry);
}

function findMarkerByLabel(label) {
  const q = (label || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  if (!q) return null;
  return markerRegistry.find(item => {
    const n = (item.name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    return n.includes(q) || q.includes(n);
  }) || null;
}

function focusMarkerByLabel(label, rowEl = null) {
  const found = findMarkerByLabel(label);
  if (!found) return;

  if (rowEl) {
    clearActiveRow();
    rowEl.classList.add('active-row');
    activeRow = rowEl;
  }

  setActiveMarker(found.marker);
  // Prevent map flyTo if in megafauna mode and a species badge is active
  const satwaBadges = document.getElementById('satwa-badges');
  const isSatwaActive = currentMode === 'megafauna' && satwaBadges && satwaBadges.classList.contains('has-active');
  if (!isSatwaActive) {
    map.flyTo(found.marker.getLatLng(), Math.max(map.getZoom(), 6), { duration: 0.6 });
  }
  setTimeout(() => showCallout(found), 260);
}

function buildPopupHtml(entry) {
  const isSpecies = entry.kind === 'species';
  const item = entry.item;
  const unitMap = { provinsi: 'hektare', kabupaten: 'hektare', konservasi: 'hektare', megafauna: 'hektare habitat terdampak' };
  const tagMap  = { provinsi: 'provinsi', kabupaten: 'kabupaten', konservasi: 'kawasan konservasi', megafauna: 'megafauna' };
  const unit = unitMap[entry.mode] || 'hektare';
  const tag  = tagMap[entry.mode]  || entry.mode;
  const rank = !isSpecies ? `<div class="popup-rank"></div>` : `<div class="popup-rank">Megafauna ikonik</div>`;
  return `<div class="popup-inner">${rank}<div class="popup-name">${item.name}</div><div class="popup-val">${item.value}</div><div class="popup-unit">${unit}</div></div>`;
}

function showCallout(entry) {
  if (!entry) return;
  activeEntry = entry;
  setActiveMarker(entry.marker);
  entry.marker.setPopupContent(buildPopupHtml(entry));
  entry.marker.openPopup();
}

function createRankMarker(item) {
  const icon = L.divIcon({
    className: '',
    html: `<div class="rank-dot">${item.rank}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
  const marker = L.marker([item.lat, item.lng], { icon }).addTo(markerLayer);

  const offsets = {
    right: [20, 0], left: [-20, 0], top: [0, -18], bottom: [0, 18]
  };
  const direction = item.dir || 'right';

  const entry = { name: item.name, marker, value: item.value, mode: currentMode, item, kind: 'rank' };

  marker.bindPopup('', { closeButton: true, maxWidth: 280, minWidth: 190 });

  marker.on('mouseover', () => setActiveMarker(marker));
  marker.on('mouseout', () => {
    if (!activeEntry || activeEntry.marker !== marker) setActiveMarker(null);
  });
  marker.on('click', () => {
    showCallout(entry);
    clearActiveRow();
  });

  registerMarker(entry);
}

function createSpeciesMarker(item) {
  // Create invisible marker for interaction reference (not displayed on map)
  const icon = L.divIcon({
    className: '',
    html: '<div style="display:none;"></div>',
    iconSize: [0, 0],
    iconAnchor: [0, 0]
  });
  const marker = L.marker([item.lat, item.lng], { icon }).addTo(markerLayer);

  const entry = { name: item.name, marker, value: item.value, mode: currentMode, item, kind: 'species' };

  marker.on('click', () => {
    showCallout(entry);
    clearActiveRow();
  });

  registerMarker(entry);
  
  // Create satwa badge
  createSatwaBadge(item, entry);
}

function createSatwaBadge(item, entry) {
  const badgesContainer = document.getElementById('satwa-badges');
  const badge = document.createElement('div');
  badge.className = 'satwa-badge';
  badge.dataset.species = item.name;

  // Short display name
  const shortName = item.name.split(' ').slice(-2).join(' ');

  badge.innerHTML = `
    <div class="satwa-badge-circle">
      <img src="${item.image || ''}" alt="${item.name}">
    </div>
    <div class="satwa-badge-name" title="${item.name}">${shortName}</div>
    <div class="satwa-badge-detail">
      <span class="si-name">${item.name}</span>
      <span class="si-val">${item.value}</span>
      <span class="si-unit">habitat terdampak</span>
    </div>
  `;

  badge.addEventListener('click', async (e) => {
    e.stopPropagation();
    const isActive = badge.classList.contains('active');

    // Deactivate all badges
    document.querySelectorAll('.satwa-badge.active').forEach(b => b.classList.remove('active'));
    badgesContainer.classList.remove('has-active');
    polygonLayer.clearLayers();
    activePolygonSpecies = null;

    if (!isActive) {
      badge.classList.add('active');
      badgesContainer.classList.add('has-active');
      activePolygonSpecies = item.name;
      // Show popup on map marker
      showCallout(entry);
      // Load geojson: use cached or fetch from URL
      if (!item.geojson && item.geojsonUrl) {
        badge.classList.add('loading');
        try {
          const res = await fetch(item.geojsonUrl);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          item.geojson = await res.json();
        } catch (err) {
          console.error('Failed to load GeoJSON for', item.name, err);
        } finally {
          badge.classList.remove('loading');
        }
      }
      // Render polygon if available
      if (item.geojson) {
        L.geoJSON(item.geojson, {
          style: {
            color: '#bc4a3c',
            weight: 1,
            opacity: 0.85,
            fillColor: '#bc4a3c',
            fillOpacity: 1
          }
        }).addTo(polygonLayer);
        // Removed map.flyToBounds to prevent zoom/fly on badge click
      }
    } else {
      map.closePopup();
    }
  });

  badgesContainer.appendChild(badge);
  return { badge, entry };
}

function positionSatwaBadges(species) {
  if (!species || species.length === 0) return;
  const badgesContainer = document.getElementById('satwa-badges');
  badgesContainer.classList.add('visible');
}

function renderTableCard(tbl) {
  const card = document.createElement('div');
  card.className = 'table-card';

  const title = document.createElement('div');
  title.className = 'table-title';
  title.textContent = tbl.title;

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  tbl.headers.forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    hr.appendChild(th);
  });
  thead.appendChild(hr);

  const is5col = tbl.headers.length >= 5;

  const tbody = document.createElement('tbody');
  tbl.rows.forEach(row => {
    const tr = document.createElement('tr');
    const isTotalRow = String(row[0]).toLowerCase() === 'total';
    if (isTotalRow) tr.classList.add('total-row');
    row.forEach((cell, ci) => {
      const td = document.createElement('td');
      // col 2 (index 1) = rank change arrow — color by direction
      if (is5col && ci === 1 && !isTotalRow) {
        const s = String(cell);
        if (s.startsWith('↑')) { td.className = 'td-up';   }
        else if (s.startsWith('↓')) { td.className = 'td-down'; }
        else                        { td.className = 'td-same'; }
      }
      td.textContent = cell;
      tr.appendChild(td);
    });

    if (!isTotalRow) {
      // province name: index 2 for 5-col, index 1 for 4-col
      const maybeLabel = is5col ? (row[2] || '') : (row[1] || row[0] || '');
      tr.addEventListener('click', () => focusMarkerByLabel(maybeLabel, tr));
    }

    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  card.appendChild(title);
  card.appendChild(table);
  return card;
}

function fitModeToData(mode) {
  const points = [];
  (mode.markers || []).forEach(p => points.push([p.lat, p.lng]));
  (mode.species || []).forEach(p => points.push([p.lat, p.lng]));

  // Prevent map flyToBounds/setView if in megafauna mode and a species badge is active
  const satwaBadges = document.getElementById('satwa-badges');
  const isSatwaActive = currentMode === 'megafauna' && satwaBadges && satwaBadges.classList.contains('has-active');
  if (!isSatwaActive) {
    if (points.length) {
      const bounds = L.latLngBounds(points);
      map.flyToBounds(bounds.pad(0.18), {
        maxZoom: window.innerWidth < 980 ? 6 : 7,
        duration: 0.7
      });
    } else {
      map.setView([-2.3, 118], window.innerWidth < 980 ? 5 : 6);
    }
  }
}

function renderMode(modeKey) {
  const mode = MODES[modeKey];
  currentMode = modeKey;
  clearModeVisuals();
  const wrapEl = document.getElementById('wrap');

  // button active
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === modeKey);
  });

  // title + kpi
  document.getElementById('map-title').textContent = mode.title;
  document.getElementById('kpi-label').textContent = mode.kpiLabel;
  document.getElementById('kpi-val').textContent = mode.kpiVal;
  document.getElementById('kpi-unit').textContent = mode.kpiUnit;

  // sidebar notes
  document.getElementById('sidebar-notes').innerHTML = mode.notesSidebar.map(n => `<li>${n}</li>`).join('');

  // notes box
  document.getElementById('notes-list').innerHTML = mode.notesBox.map(n => `<li>${n}</li>`).join('');

  // bubble
  const bubble = document.getElementById('others-bubble');
  if (mode.bubble) {
    bubble.style.display = 'flex';
    document.getElementById('bubble-label').textContent = mode.bubble.label;
    document.getElementById('bubble-val').textContent = mode.bubble.value;
    document.getElementById('bubble-unit').textContent = mode.bubble.unit;
  } else {
    bubble.style.display = 'none';
  }

  // markers
  if (mode.markers) {
    mode.markers.forEach(createRankMarker);
  }
  if (mode.species) {
    mode.species.forEach(createSpeciesMarker);
  }

  // tables
  const tableWrap = document.getElementById('table-wrap');
  const tableToggle = document.getElementById('table-toggle');
  if (mode.tables && mode.tables.length) {
    mode.tables.forEach(t => tableWrap.appendChild(renderTableCard(t)));
    tableToggle.style.display = 'block';
  } else {
    tableToggle.style.display = 'none';
  }
  // beri tahu Leaflet bahwa ukuran kontainer peta berubah
  requestAnimationFrame(() => map.invalidateSize());

  // per-mode layout tuning
  if (modeKey === 'megafauna') {
    positionSatwaBadges(mode.species);
  }

  // Prevent map movement if already in megafauna mode and a species badge is active
  const satwaBadges = document.getElementById('satwa-badges');
  const isSatwaActive = modeKey === 'megafauna' && satwaBadges && satwaBadges.classList.contains('has-active');
  if (!isSatwaActive) {
    if (mode.view) {
      map.setView([mode.view.lat, mode.view.lng], mode.view.zoom);
    } else {
      fitModeToData(mode);
    }
  }
}



document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => renderMode(btn.dataset.mode));
});

window.addEventListener('keydown', (e) => {
  const mapping = { '1': 'provinsi', '2': 'kabupaten', '3': 'konservasi', '4': 'megafauna' };
  const mode = mapping[e.key];
  if (!mode) return;
  renderMode(mode);
});

document.getElementById('table-toggle').addEventListener('click', () => {
  const panel = document.getElementById('table-panel');
  panel.classList.toggle('open');
  setTimeout(() => map.invalidateSize(), 300);
});

renderMode('megafauna');
</script>
</body>
</html>
