<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Single Image Editorial</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f0e8;
    }

    .container {
      max-width: 980px;
    }

    /* gambar utama */
    .main-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    .main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* caption */
    .caption-box {
      margin-top: 6px;
    }

    .caption {
      font-size: 12px;
      color: #444;
      line-height: 1.4;
    }

    /* 🔥 ini yang bikin rapat */
    .caption p {
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- GAMBAR -->
    <div class="main-img">
      <img 
        src="assets/foto/DJI_20250513093446_0007_V.jpg"
        alt="Deforestasi"
      >
    </div>

    <!-- CAPTION -->
    <div class="caption-box">
      <div class="caption">
        <p>Area Penggunaan Lain, Konsesi Sawit, PT Banyan Tumbuh Lestari,</p>
        <p>Pahuwato, Gorontalo, Mei 2025</p>
      </div>
    </div>

  </div>

</body>

</html>
